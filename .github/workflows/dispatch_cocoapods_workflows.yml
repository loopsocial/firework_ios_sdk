name: Dispatch Deploy CocoaPod Trunk

run-name: Dispatch Deploy CocoaPod Trunk from ${{ inputs.ref_type }}

on:
  workflow_dispatch:
    inputs:
      ref_type:
        description: Ref type to run Deploy CocoaPod Trunk from.
        required: true
        default: branch
        type: choice
        options:
          - branch
          - latest_tag
          - tag
      ref_name:
        description: Branch or tag name. Defaults to main for branch, ignored for latest_tag.
        required: false
        default: main
        type: string

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-24.04
    steps:
      - name: Trigger Deploy CocoaPod Trunk
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          REF_NAME: ${{ inputs.ref_name }}
          REF_TYPE: ${{ inputs.ref_type }}
        run: |
          set -euo pipefail

          case "$REF_TYPE" in
            branch)
              target_ref="${REF_NAME:-main}"
              if [[ -z "${target_ref// }" ]]; then
                echo "ref_name is required when ref_type is branch."
                exit 1
              fi
              gh api "repos/$GH_REPO/git/ref/heads/$target_ref" > /dev/null
              ;;
            latest_tag)
              target_ref="$(gh api "repos/$GH_REPO/tags?per_page=1" --jq '.[0].name')"
              if [[ -z "${target_ref// }" ]]; then
                echo "No tags found."
                exit 1
              fi
              ;;
            tag)
              target_ref="$REF_NAME"
              if [[ -z "${target_ref// }" ]]; then
                echo "ref_name is required when ref_type is tag."
                exit 1
              fi
              gh api "repos/$GH_REPO/git/ref/tags/$target_ref" > /dev/null
              ;;
            *)
              echo "Unsupported ref_type: $REF_TYPE"
              exit 1
              ;;
          esac

          echo "Dispatching Deploy CocoaPod Trunk from ref: $target_ref"
          gh workflow run deploy_cocoapod_trunk.yml --repo "$GH_REPO" --ref "$target_ref"
