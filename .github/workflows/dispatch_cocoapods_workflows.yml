name: Dispatch Deploy CocoaPod Trunk

run-name: Dispatch Deploy CocoaPod Trunk

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Optional tag to run Deploy CocoaPod Trunk from. Leave empty to use the latest repository tag.
        required: false
        type: string

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-24.04
    steps:
      - name: Trigger Deploy CocoaPod Trunk
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          set -euo pipefail

          target_ref="$TAG_NAME"
          if [[ -z "${target_ref// }" ]]; then
            target_ref="$(gh api "repos/$GH_REPO/tags?per_page=1" --jq '.[0].name')"
          fi

          if [[ -z "${target_ref// }" ]]; then
            echo "No tag was provided and no tags were found."
            exit 1
          fi

          gh api "repos/$GH_REPO/git/ref/tags/$target_ref" > /dev/null

          echo "Dispatching Deploy CocoaPod Trunk from ref: $target_ref"
          gh workflow run deploy_cocoapod_trunk.yml --repo "$GH_REPO" --ref "$target_ref"
