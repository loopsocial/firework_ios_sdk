name: Deploy CocoaPod Trunk (Static)

# This workflow lives only on the `static` branch. It publishes the
# FireworkVideoStatic pod whenever a `<version>-static` tag is pushed to
# this branch (the source-repo release pipeline creates that tag at the end
# of every release). The `main` branch keeps its own deploy_cocoapod_trunk.yml
# that publishes the dynamic FireworkVideo pod.

on:
  push:
    tags:
      - "*-static"

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1
      - name: Install CocoaPods
        run: gem install cocoapods
      - name: Publish to CocoaPod register
        env:
          # For info on how to obtain a new token see
          # https://medium.com/swlh/automated-cocoapod-releases-with-github-actions-8526dd4535c7
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: |
          pod trunk push FireworkVideoStatic.podspec --allow-warnings
